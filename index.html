<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Architect: Code & Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        .phone-screen {
            width: 320px;
            height: 580px;
            background: white;
            border-radius: 40px;
            border: 10px solid #0f172a;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .code-pane {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            border-radius: 12px;
            height: 300px;
            overflow: auto;
            padding: 1rem;
        }
        .component-active {
            border: 2px solid #6366f1;
            position: relative;
        }
        .nudge-tool {
            position: absolute;
            top: -25px;
            right: 0;
            background: #6366f1;
            color: white;
            display: flex;
            gap: 5px;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 10px;
            z-index: 20;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-200 p-6">

<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-7 space-y-6">
        <div>
            <h1 class="text-3xl font-bold text-white">🚀 App Architect <span class="text-indigo-400">Code-View</span></h1>
            <p class="text-slate-400">Type to build. Watch the code translate in real-time.</p>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-4">
            <div class="flex gap-2">
                <input type="text" id="cmdInput" placeholder="Add a 'Header' named 'Mr. Grindstaff'..." 
                    class="flex-1 p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-indigo-500 text-white">
                <button onclick="processInput()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl font-bold transition-all">Generate</button>
            </div>
            <div class="flex gap-3">
                <label class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-bold cursor-pointer transition-all">
                    📷 Add Image
                    <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="handleImage(this)">
                </label>
                <button onclick="resetAll()" class="text-slate-500 hover:text-red-400 text-sm font-bold">Clear Project</button>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Source Code (Live Translation)</label>
            <pre class="code-pane"><code id="codeDisplay" class="language-html">&lt;!-- Your App Code Appears Here --&gt;</code></pre>
        </div>
    </div>

    <div class="lg:col-span-5 flex flex-col items-center">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Device Prototype</label>
        <div class="phone-screen" id="viewport">
            <div id="placeholder" class="p-10 text-center text-slate-300 mt-20 italic">
                Your wireframe is empty.<br>Start coding on the left!
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    let appComponents = [];

    function updateCodeView() {
        const display = document.getElementById('codeDisplay');
        if (appComponents.length === 0) {
            display.textContent = "";
        } else {
            // Map components to clean HTML strings for the code editor
            const codeString = appComponents.map(comp => comp.htmlCode.trim()).join('\n');
            display.textContent = codeString;
        }
        Prism.highlightElement(display);
    }

    function renderViewport() {
        const viewport = document.getElementById('viewport');
        viewport.innerHTML = "";
        
        appComponents.forEach((comp, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = "component-active group";
            wrapper.style.marginTop = comp.type === 'Header' ? '0' : '10px';
            
            wrapper.innerHTML = `
                <div class="nudge-tool opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="moveComp(${index}, -1)">▲</button>
                    <button onclick="moveComp(${index}, 1)">▼</button>
                    <button onclick="removeComp(${index})" class="text-red-300 ml-2">✕</button>
                </div>
                ${comp.renderedHTML}
            `;
            viewport.appendChild(wrapper);
        });

        if (appComponents.length === 0) {
            viewport.innerHTML = `<div class="p-10 text-center text-slate-300 mt-20 italic">Empty Wireframe.</div>`;
        }
        updateCodeView();
    }

    function processInput() {
        const input = document.getElementById('cmdInput').value;
        if (!input) return;

        // Capture exactly what is inside quotes
        const match = input.match(/"([^"]+)"|'([^']+)'/);
        const userText = match ? (match[1] || match[2]) : "Untitled";

        let newComp = {};

        if (input.toLowerCase().includes('header')) {
            newComp = {
                type: 'Header',
                htmlCode: `<h1 class="text-2xl font-black p-6 bg-white border-b text-slate-900">${userText}</h1>`,
                renderedHTML: `<h1 class="text-2xl font-black p-6 bg-white border-b text-slate-900">${userText}</h1>`
            };
        } 
        else if (input.toLowerCase().includes('button')) {
            newComp = {
                type: 'Button',
                htmlCode: `<button class="w-11/12 mx-auto block bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg">${userText}</button>`,
                renderedHTML: `<div class="p-2"><button class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg">${userText}</button></div>`
            };
        }
        else {
            newComp = {
                type: 'Text',
                htmlCode: `<p class="p-4 text-slate-600">${userText}</p>`,
                renderedHTML: `<p class="p-4 text-slate-600">${userText}</p>`
            };
        }

        appComponents.push(newComp);
        renderViewport();
        document.getElementById('cmdInput').value = "";
    }

    function handleImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                appComponents.push({
                    type: 'Image',
                    htmlCode: `<img src="user_asset.png" class="w-full rounded-xl shadow-md">`,
                    renderedHTML: `<div class="p-4"><img src="${e.target.result}" class="w-full rounded-xl shadow-md"></div>`
                });
                renderViewport();
            }
            reader.readAsDataURL(file);
        }
    }

    function moveComp(index, direction) {
        const newIndex = index + direction;
        if (newIndex >= 0 && newIndex < appComponents.length) {
            const temp = appComponents[index];
            appComponents[index] = appComponents[newIndex];
            appComponents[newIndex] = temp;
            renderViewport();
        }
    }

    function removeComp(index) {
        appComponents.splice(index, 1);
        renderViewport();
    }

    function resetAll() {
        appComponents = [];
        renderViewport();
    }
</script>

</body>
</html>
