<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Architect: Grid & UI/UX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        /* Larger Phone Canvas */
        .phone-viewport {
            width: 400px;
            height: 720px;
            background: white;
            border-radius: 48px;
            border: 14px solid #0f172a;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            /* Grid Pattern */
            background-image: 
                linear-gradient(to right, #f1f5f9 1px, transparent 1px),
                linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .code-pane {
            background: #111827;
            color: #e5e7eb;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            border-radius: 16px;
            height: 350px;
            overflow: auto;
            padding: 1.5rem;
            border: 1px solid #374151;
        }

        .ui-component {
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ui-component:hover {
            outline: 2px solid #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .nudge-controls {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #6366f1;
            display: flex;
            gap: 2px;
            padding: 2px;
            border-radius: 6px;
            z-index: 30;
            opacity: 0;
        }

        .ui-component:hover .nudge-controls { opacity: 1; }

        .control-btn {
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-8 min-h-screen">

<div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12">
    
    <div class="lg:col-span-7 flex flex-col gap-6">
        <div>
            <h1 class="text-4xl font-black text-white tracking-tight italic">APP ARCHITECT <span class="text-indigo-500">PRO</span></h1>
            <p class="text-slate-500 mt-2">Visualizing Code: Drag, Drop, and Develop.</p>
        </div>

        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl space-y-6">
            <div class="flex gap-4">
                <input type="text" id="cmdInput" placeholder='e.g. Add "Header" named "Mr. Grindstaff"' 
                    class="flex-1 p-4 bg-slate-800 border border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
                <button onclick="addComponent()" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-2xl font-black transition-all">GENERATE</button>
            </div>

            <div class="flex items-center gap-4">
                <label class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-bold cursor-pointer transition-all flex items-center gap-2">
                    <span>📁 Upload Assets</span>
                    <input type="file" class="hidden" accept="image/*" onchange="handleFile(this)">
                </label>
                <button onclick="resetApp()" class="text-slate-500 hover:text-red-400 font-bold uppercase text-xs tracking-widest">Clear Workspace</button>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-end">
                <label class="text-xs font-bold text-indigo-400 uppercase tracking-[0.2em]">Source Code Editor</label>
                <span class="text-[10px] text-slate-600">READ-ONLY TRANSLATION</span>
            </div>
            <pre class="code-pane"><code id="codeDisplay" class="language-html">&lt;!-- Wireframe Code --&gt;</code></pre>
        </div>
    </div>

    <div class="lg:col-span-5 flex flex-col items-center">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Device Frame (Grid: 20px)</label>
        
        <div class="phone-viewport shadow-indigo-500/10" id="canvas">
            <div id="welcome" class="mt-40 p-12 text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <span class="text-2xl">📱</span>
                </div>
                <p class="text-slate-400 italic">Add your first component to see the grid in action.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    let projectItems = [];

    function updateEditor() {
        const display = document.getElementById('codeDisplay');
        if (projectItems.length === 0) {
            display.textContent = "";
        } else {
            const code = projectItems.map(item => item.code.trim()).join('\n');
            display.textContent = code;
        }
        Prism.highlightElement(display);
    }

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        
        projectItems.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = "ui-component";
            div.innerHTML = `
                <div class="nudge-controls">
                    <button class="control-btn" onclick="move(${i}, -1)">▲</button>
                    <button class="control-btn" onclick="move(${i}, 1)">▼</button>
                    <button class="control-btn bg-red-500/20" onclick="remove(${i})">✕</button>
                </div>
                ${item.render}
            `;
            canvas.appendChild(div);
        });

        if (projectItems.length === 0) {
            canvas.innerHTML = `<div class="mt-40 p-12 text-center text-slate-400 italic">Empty Canvas</div>`;
        }
        updateEditor();
    }

    function addComponent() {
        const val = document.getElementById('cmdInput').value;
        if (!val) return;

        const match = val.match(/"([^"]+)"|'([^']+)'/);
        const name = match ? (match[1] || match[2]) : "New Component";

        let newItem = {};
        if (val.toLowerCase().includes('header')) {
            newItem = {
                code: `<h1 class="text-3xl font-extrabold p-8 bg-white border-b-2 border-indigo-100 text-slate-900">${name}</h1>`,
                render: `<h1 class="text-3xl font-extrabold p-8 bg-white border-b-2 border-indigo-100 text-slate-900">${name}</h1>`
            };
        } else if (val.toLowerCase().includes('button')) {
            newItem = {
                code: `<button class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl">${name}</button>`,
                render: `<div class="p-6"><button class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">${name}</button></div>`
            };
        } else {
            newItem = {
                code: `<div class="px-8 py-4 text-slate-500 border-l-4 border-indigo-500 m-4 bg-slate-50 font-medium">${name}</div>`,
                render: `<div class="px-8 py-4 text-slate-500 border-l-4 border-indigo-500 m-4 bg-slate-50 font-medium">${name}</div>`
            };
        }

        projectItems.push(newItem);
        render();
        document.getElementById('cmdInput').value = "";
    }

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                projectItems.push({
                    code: `<img src="uploaded_screenshot.png" class="w-full rounded-3xl shadow-2xl">`,
                    render: `<div class="p-6"><img src="${e.target.result}" class="w-full rounded-3xl shadow-2xl border-4 border-white"></div>`
                });
                render();
            };
            reader.readAsDataURL(file);
        }
    }

    function move(i, dir) {
        const to = i + dir;
        if (to >= 0 && to < projectItems.length) {
            [projectItems[i], projectItems[to]] = [projectItems[to], projectItems[i]];
            render();
        }
    }

    function remove(i) {
        projectItems.splice(i, 1);
        render();
    }

    function resetApp() {
        projectItems = [];
        render();
    }
</script>
</body>
</html>
