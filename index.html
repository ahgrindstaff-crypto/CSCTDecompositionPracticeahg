<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>App Architect: Plain English Decomposition</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --panel: #ffffff; --accent: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 380px; background: var(--panel); border-right: 1px solid #e2e8f0; padding: 30px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        
        /* The "Phone" Mockup */
        .stage { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #e2e8f0; }
        #phone-screen { width: 320px; height: 580px; background: white; border: 12px solid #1e293b; border-radius: 40px; position: relative; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        /* Decomposition Styling */
        .layer { border: 2px dashed #cbd5e1; padding: 15px; border-radius: 12px; position: relative; transition: all 0.3s ease; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .layer::before { content: attr(data-type); position: absolute; top: -10px; left: 10px; background: var(--primary); color: white; font-size: 9px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }
        
        /* Input Area */
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--primary); }
        .hint { font-size: 12px; color: #64748b; margin-top: 10px; line-height: 1.5; }
        
        h2 { color: #1e293b; margin-top: 0; }
        .log { margin-top: auto; background: #1e293b; color: #10b981; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; height: 150px; overflow-y: auto; }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🚀 App Architect</h2>
    <p>Tell the computer what to build in <b>Plain English</b>.</p>
    
    <input type="text" id="userTask" placeholder="e.g., 'Add a header for my dog app'..." onkeypress="handleKey(event)">
    
    <div class="hint">
        <b>Try typing:</b><br>
        • "Add a <u>header</u> for my game"<br>
        • "Make a <u>section</u> for my stats"<br>
        • "Put a <u>card</u> inside the section"<br>
        • "Add a <u>footer</u> at the bottom"
    </div>

    <div class="log" id="codeLog">// Decomposition Log:<br>> Waiting for input...</div>
    <button onclick="location.reload()" style="margin-top:10px; padding:8px; cursor:pointer;">Start Over</button>
</div>

<div class="stage">
    <div id="phone-screen">
        </div>
</div>

<script>
    function handleKey(e) {
        if (e.key === 'Enter') {
            const val = document.getElementById('userTask').value.toLowerCase();
            processInput(val);
            document.getElementById('userTask').value = '';
        }
    }

    function processInput(input) {
        const screen = document.getElementById('phone-screen');
        const log = document.getElementById('codeLog');
        let type = "";
        let content = "New Component";
        let target = screen;

        // Extract content (anything after 'for' or 'about')
        const contentMatch = input.match(/(?:for|about|named) (.*)/);
        if (contentMatch) content = contentMatch[1];

        // Decomposition Logic
        if (input.includes("header")) {
            type = "header";
            target.insertAdjacentHTML('afterbegin', `<header class="layer" data-type="Header"><h3>${content}</h3></header>`);
        } 
        else if (input.includes("section")) {
            type = "section";
            target.innerHTML += `<section class="layer" data-type="Section" id="sec-${Date.now()}"><h4>${content}</h4></section>`;
        } 
        else if (input.includes("card")) {
            type = "div";
            const lastSection = screen.querySelector('section:last-child');
            const parent = lastSection ? lastSection : screen;
            parent.innerHTML += `<div class="layer" data-type="Card" style="border-color:var(--accent); background:#f0fdf4;">${content}</div>`;
        }
        else if (input.includes("footer")) {
            type = "footer";
            target.insertAdjacentHTML('beforeend', `<footer class="layer" data-type="Footer" style="margin-top:auto;"><p>${content}</p></footer>`);
        }
        else {
            alert("I didn't recognize that! Try using the words: header, section, card, or footer.");
            return;
        }

        log.innerHTML += `<br>> Decomposed "${input}" into &lt;${type}&gt;`;
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>
