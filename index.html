<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Architect: Professional Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        .phone-viewport {
            width: 380px; height: 680px; background: white; border-radius: 48px; border: 12px solid #0f172a;
            position: relative; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .code-pane { background: #0d1117; color: #c9d1d9; font-family: 'Fira Code', monospace; font-size: 11px; border-radius: 12px; height: 180px; overflow: auto; padding: 1rem; border: 1px solid #30363d; }
        .ui-component { position: relative; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .ui-component:hover { border: 2px dashed #6366f1; background: rgba(99,102,241,0.05); }
        .ui-component.selected { border: 2px solid #6366f1; background: rgba(99,102,241,0.1); }
        .nudge-controls { position: absolute; top: -30px; right: 0; background: #6366f1; display: flex; gap: 2px; padding: 2px; border-radius: 6px; z-index: 50; }
        .control-btn { color: white; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 p-4 min-h-screen font-sans">

<div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-4 space-y-4">
        <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
            <h2 class="text-xl font-black mb-4 uppercase tracking-tighter">🚀 Create</h2>
            <div class="flex flex-col gap-3">
                <input type="text" id="cmdInput" placeholder='Add "Header" named "App Title"...' 
                    class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-white">
                <button onclick="addComponent()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black transition-all text-sm">BUILD NEW</button>
            </div>
        </div>

        <div id="inspector" class="bg-indigo-900/20 p-6 rounded-3xl border border-indigo-500/30 shadow-xl hidden">
            <h3 class="text-indigo-400 font-black text-xs uppercase tracking-widest mb-4">Component Inspector</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-slate-400 block mb-1">CONTENT TEXT</label>
                    <input type="text" id="editLabel" oninput="updateSelected()" class="w-full p-2 bg-slate-900 rounded-lg text-sm border border-slate-700 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1">SIZE (PADDING)</label>
                        <select id="editPadding" onchange="updateSelected()" class="w-full p-2 bg-slate-900 rounded-lg text-xs border border-slate-700">
                            <option value="p-2">Small</option>
                            <option value="p-6" selected>Medium</option>
                            <option value="p-10">Large</option>
                            <option value="p-16">Extra Large</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-1">TEXT SCALE</label>
                        <select id="editText" onchange="updateSelected()" class="w-full p-2 bg-slate-900 rounded-lg text-xs border border-slate-700">
                            <option value="text-sm">Tiny</option>
                            <option value="text-base">Normal</option>
                            <option value="text-2xl">Large</option>
                            <option value="text-4xl">Huge</option>
                        </select>
                    </div>
                </div>
                <button onclick="deselect()" class="w-full text-[10px] text-indigo-400 font-bold uppercase mt-2">Deselect & Save</button>
            </div>
        </div>

        <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
            <h3 class="text-slate-500 font-bold text-[10px] uppercase tracking-widest mb-2">Reference Guide</h3>
            <div class="grid grid-cols-2 gap-2 text-[10px] text-slate-400">
                <div class="bg-slate-950 p-2 rounded">"Header"</div>
                <div class="bg-slate-950 p-2 rounded">"Button"</div>
                <div class="bg-slate-950 p-2 rounded">"Section"</div>
                <div class="bg-slate-950 p-2 rounded">"Text"</div>
            </div>
        </div>
    </div>

    <div class="lg:col-span-4 space-y-4">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">Production HTML Source</label>
        <pre class="code-pane"><code id="codeDisplay" class="language-html">&lt;!-- Select a component to see its specific code --&gt;</code></pre>
        
        <div class="p-6 bg-emerald-900/10 border border-emerald-500/20 rounded-3xl">
            <h4 class="text-emerald-400 font-bold text-xs mb-2">UI/UX TIP</h4>
            <p class="text-[11px] text-slate-400 leading-relaxed">Click any item on the phone to edit its properties. Use the <b>Padding</b> setting to create "White Space" in your design.</p>
        </div>
    </div>

    <div class="lg:col-span-4 flex flex-col items-center">
        <div class="phone-viewport" id="canvas">
            <div class="mt-40 p-12 text-center text-slate-400 italic text-sm">Build or upload to start.</div>
        </div>
        <button onclick="resetApp()" class="mt-4 text-[10px] text-slate-600 hover:text-red-500 font-bold">WIPE PROJECT</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    let projectItems = [];
    let selectedIndex = null;

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        
        projectItems.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `ui-component ${selectedIndex === i ? 'selected' : ''}`;
            div.onclick = (e) => { e.stopPropagation(); selectComponent(i); };
            
            // Build visual representation based on object data
            let innerHTML = "";
            if(item.type === 'Header') innerHTML = `<h1 class="${item.textSize} font-black ${item.padding} bg-white border-b text-slate-900">${item.label}</h1>`;
            else if(item.type === 'Button') innerHTML = `<div class="${item.padding}"><button class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg ${item.textSize}">${item.label}</button></div>`;
            else if(item.type === 'Section') innerHTML = `<div class="m-4 ${item.padding} rounded-3xl bg-slate-50 border border-slate-200 shadow-sm"><h3 class="font-bold text-slate-400 text-[10px] mb-1">SECTION</h3><p class="${item.textSize} text-slate-800">${item.label}</p></div>`;
            else if(item.type === 'Image') innerHTML = `<div class="${item.padding}"><img src="${item.src}" class="w-full rounded-2xl shadow-xl"></div>`;
            else innerHTML = `<p class="${item.padding} ${item.textSize} text-slate-600">${item.label}</p>`;

            div.innerHTML = `
                ${selectedIndex === i ? `
                <div class="nudge-controls">
                    <button class="control-btn" onclick="event.stopPropagation(); move(${i}, -1)">▲</button>
                    <button class="control-btn" onclick="event.stopPropagation(); move(${i}, 1)">▼</button>
                    <button class="control-btn bg-red-500/20" onclick="event.stopPropagation(); remove(${i})">✕</button>
                </div>` : ''}
                ${innerHTML}
            `;
            canvas.appendChild(div);
        });

        updateCode();
    }

    function selectComponent(i) {
        selectedIndex = i;
        const item = projectItems[i];
        const inspector = document.getElementById('inspector');
        inspector.classList.remove('hidden');
        
        document.getElementById('editLabel').value = item.label || "Image Asset";
        document.getElementById('editPadding').value = item.padding;
        document.getElementById('editText').value = item.textSize;
        
        render();
    }

    function updateSelected() {
        if (selectedIndex === null) return;
        projectItems[selectedIndex].label = document.getElementById('editLabel').value;
        projectItems[selectedIndex].padding = document.getElementById('editPadding').value;
        projectItems[selectedIndex].textSize = document.getElementById('editText').value;
        render();
    }

    function deselect() {
        selectedIndex = null;
        document.getElementById('inspector').classList.add('hidden');
        render();
    }

    function addComponent() {
        const val = document.getElementById('cmdInput').value;
        if (!val) return;
        const match = val.match(/"([^"]+)"|'([^']+)'/);
        const name = match ? (match[1] || match[2]) : "Untitled";

        let type = "Text";
        if (val.toLowerCase().includes('header')) type = "Header";
        else if (val.toLowerCase().includes('button')) type = "Button";
        else if (val.toLowerCase().includes('section')) type = "Section";

        projectItems.push({
            type: type,
            label: name,
            padding: 'p-6',
            textSize: type === 'Header' ? 'text-2xl' : 'text-base'
        });
        
        document.getElementById('cmdInput').value = "";
        render();
    }

    function updateCode() {
        const codeDisplay = document.getElementById('codeDisplay');
        const code = projectItems.map(item => {
            if(item.type === 'Image') return `<img src="asset.png" class="rounded-xl ${item.padding}">`;
            return `<div class="${item.type} ${item.padding} ${item.textSize}">${item.label}</div>`;
        }).join('\n');
        codeDisplay.textContent = code || "";
        Prism.highlightElement(codeDisplay);
    }

    function move(i, dir) {
        const to = i + dir;
        if (to >= 0 && to < projectItems.length) {
            [projectItems[i], projectItems[to]] = [projectItems[to], projectItems[i]];
            selectedIndex = to;
            render();
        }
    }

    function remove(i) {
        projectItems.splice(i, 1);
        selectedIndex = null;
        document.getElementById('inspector').classList.add('hidden');
        render();
    }

    function resetApp() { projectItems = []; render(); }
</script>
</body>
</html>
