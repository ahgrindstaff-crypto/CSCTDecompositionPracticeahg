<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Architect: Wireframe Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .phone-screen {
            width: 340px;
            height: 620px;
            background: #ffffff;
            border-radius: 40px;
            border: 12px solid #0f172a;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden; /* Keeps wireframe contained */
        }
        /* The draggable container */
        .wireframe-element {
            position: absolute;
            cursor: move;
            transition: border 0.2s;
            border: 2px transparent;
            width: 90%;
            left: 5%;
        }
        .wireframe-element:hover {
            border: 2px dashed #6366f1;
        }
        /* Control Overlay for Students */
        .controls {
            position: absolute;
            top: -30px;
            right: 0;
            display: none;
            background: #6366f1;
            border-radius: 4px;
            padding: 2px;
            gap: 4px;
            z-index: 50;
        }
        .wireframe-element:hover .controls { display: flex; }
        .control-btn { color: white; font-size: 10px; padding: 2px 6px; cursor: pointer; border: 1px solid white; border-radius: 3px; }
        .control-btn:hover { background: white; color: #6366f1; }

        .log-box {
            background: #1e293b;
            color: #38bdf8;
            font-family: 'Courier New', monospace;
            height: 150px;
            overflow-y: auto;
            border-bottom: 4px solid #0f172a;
        }
    </style>
</head>
<body class="bg-slate-50 p-8">

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
    <div class="space-y-6">
        <h1 class="text-3xl font-black text-slate-800">🛠️ Wireframe <span class="text-indigo-600">Architect</span></h1>
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-4">
            <p class="text-sm text-slate-500 font-medium uppercase">Step 1: Add Content</p>
            <div class="flex gap-2">
                <input type="text" id="cmd" placeholder="e.g. Add 'Header' named 'My App'" class="flex-1 p-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-400">
                <button onclick="addElement()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold">Add</button>
            </div>
            
            <p class="text-sm text-slate-500 font-medium uppercase mt-4">Step 2: Upload Visuals</p>
            <label class="block w-full text-center bg-emerald-500 text-white p-3 rounded-xl font-bold cursor-pointer hover:bg-emerald-600">
                Upload Screenshot/Image
                <input type="file" id="imgIn" class="hidden" accept="image/*" onchange="uploadImage(this)">
            </label>
        </div>

        <div class="log-box p-4 rounded-2xl">
            > Wireframe Engine Online...<br>
            > Use the arrows on components to move them!
            <div id="logContent"></div>
        </div>
        <button onclick="location.reload()" class="text-slate-400 font-bold hover:text-red-500">Clear All & Start Over</button>
    </div>

    <div class="flex justify-center">
        <div class="phone-screen" id="viewport">
            </div>
    </div>
</div>

<script>
    const viewport = document.getElementById('viewport');
    const log = document.getElementById('logContent');

    function writeLog(msg) {
        log.innerHTML += `<br>> ${msg}`;
        log.parentElement.scrollTop = log.parentElement.scrollHeight;
    }

    // Function to Move Elements
    function move(btn, direction) {
        const el = btn.closest('.wireframe-element');
        let top = parseInt(el.style.top) || 0;
        const step = 20;

        if (direction === 'up') top -= step;
        if (direction === 'down') top += step;
        
        el.style.top = top + "px";
        writeLog(`Moved component to Y-axis: ${top}px`);
    }

    function createWrapper(innerpHTML, type) {
        const wrapper = document.createElement('div');
        wrapper.className = "wireframe-element p-2";
        wrapper.style.top = (viewport.children.length * 80) + "px"; // Auto-stack initially
        
        wrapper.innerHTML = `
            <div class="controls">
                <div class="control-btn" onclick="move(this, 'up')">▲</div>
                <div class="control-btn" onclick="move(this, 'down')">▼</div>
                <div class="control-btn" onclick="this.closest('.wireframe-element').remove()">✕</div>
            </div>
            ${innerpHTML}
        `;
        viewport.appendChild(wrapper);
    }

    function addElement() {
        const val = document.getElementById('cmd').value;
        if (!val) return;

        // Simple decomposition for headers/buttons
        if (val.toLowerCase().includes('header')) {
            createWrapper(`<h1 class="text-xl font-bold p-3 bg-slate-100 rounded-lg border border-slate-200">${val.split("'")[1] || 'Header'}</h1>`, 'Header');
        } else if (val.toLowerCase().includes('button')) {
            createWrapper(`<button class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg">${val.split("'")[1] || 'Button'}</button>`, 'Button');
        } else {
            createWrapper(`<div class="p-4 bg-white border border-slate-200 rounded-lg text-sm">${val}</div>`, 'Text');
        }
        
        writeLog(`Added ${val} to wireframe.`);
        document.getElementById('cmd').value = "";
    }

    function uploadImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                createWrapper(`<img src="${e.target.result}" class="w-full rounded-xl shadow-md border border-slate-200">`, 'Image');
                writeLog(`Student Screenshot "${file.name}" placed.`);
            }
            reader.readAsDataURL(file);
        }
    }
</script>

</body>
</html>
