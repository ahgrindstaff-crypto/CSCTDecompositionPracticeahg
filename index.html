<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Architect: Final Prototyper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        .phone-viewport {
            width: 380px; height: 680px; background: white; border-radius: 52px; border: 14px solid #0f172a;
            position: relative; overflow-y: auto; box-shadow: 0 30px 70px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .grid-bg {
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px), linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .code-pane { background: #0d1117; color: #c9d1d9; font-family: 'Fira Code', monospace; font-size: 11px; height: 160px; overflow: auto; padding: 1rem; border-radius: 16px; border: 1px solid #30363d; }
        .tab-active { background: #6366f1 !important; color: white !important; transform: scale(1.05); }
        .ui-component { position: relative; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .edit-mode .ui-component:hover { border: 2px dashed #6366f1; background: rgba(99,102,241,0.05); }
        .edit-mode .ui-component.selected { border: 2px solid #6366f1; background: rgba(99,102,241,0.1); }
        .preview-mode .phone-viewport { border-color: #334155; transform: scale(1.02); }
        .preview-mode .ui-component { border: none !important; background: none !important; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 p-6 min-h-screen font-sans">

<div class="max-w-[1700px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div id="sidebar" class="lg:col-span-3 space-y-4">
        <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
            <h3 class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-4">Interactive Layers</h3>
            <div class="space-y-2" id="tabs">
                <button onclick="switchScreen(0)" id="tab-0" class="tab-active w-full text-left p-3 bg-slate-800 rounded-xl text-xs font-bold transition-all">🏠 Home Screen</button>
                <button onclick="switchScreen(1)" id="tab-1" class="w-full text-left p-3 bg-slate-800 rounded-xl text-xs font-bold transition-all">📄 Screen 2</button>
                <button onclick="switchScreen(2)" id="tab-2" class="w-full text-left p-3 bg-slate-800 rounded-xl text-xs font-bold transition-all">📄 Screen 3</button>
                <button onclick="switchScreen(3)" id="tab-3" class="w-full text-left p-3 bg-slate-800 rounded-xl text-xs font-bold transition-all">📄 Screen 4</button>
                <button onclick="switchScreen(4)" id="tab-4" class="w-full text-left p-3 bg-slate-800 rounded-xl text-xs font-bold transition-all">📄 Screen 5</button>
            </div>
        </div>
        <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 text-[10px] text-slate-500">
            <b>COMMANDS:</b> Header, Button, Section, Text
        </div>
    </div>

    <div id="ide" class="lg:col-span-5 space-y-6">
        <div class="flex justify-between items-center bg-slate-900 p-3 rounded-3xl border border-slate-800">
            <h2 class="text-lg font-black px-4 uppercase tracking-tighter italic">App Architect Pro</h2>
            <div class="flex bg-slate-950 p-1 rounded-2xl">
                <button id="editBtn" onclick="setMode('edit')" class="px-6 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white">EDIT</button>
                <button id="previewBtn" onclick="setMode('preview')" class="px-6 py-2 rounded-xl text-xs font-bold text-slate-500">PLAY</button>
            </div>
        </div>

        <div id="editorUI" class="space-y-4">
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl flex gap-2">
                <input type="text" id="cmdInput" placeholder='Add "Button" named "My Site"...' 
                    class="flex-1 p-3 bg-slate-950 border border-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-white text-sm">
                <button onclick="addComponent()" class="bg-indigo-600 px-6 rounded-xl font-bold text-xs">BUILD</button>
            </div>

            <div id="inspector" class="bg-indigo-900/10 p-6 rounded-[2rem] border border-indigo-500/20 hidden space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[9px] text-slate-500 uppercase block mb-1">Display Text</label>
                        <input type="text" id="editLabel" oninput="updateSelected()" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-white">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase block mb-1">Action Type</label>
                        <select id="editActionType" onchange="toggleUrlInput(); updateSelected();" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-xs">
                            <option value="none">None (Static)</option>
                            <option value="nav">Internal Navigation</option>
                            <option value="url">External Link (URL)</option>
                        </select>
                    </div>
                    <div id="navSelectDiv" class="hidden">
                        <label class="text-[9px] text-slate-500 uppercase block mb-1">Destination Screen</label>
                        <select id="editNavDest" onchange="updateSelected()" class="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-xs">
                            <option value="0">Home</option>
                            <option value="1">Screen 2</option>
                            <option value="2">Screen 3</option>
                            <option value="3">Screen 4</option>
                            <option value="4">Screen 5</option>
                        </select>
                    </div>
                    <div id="urlInputDiv" class="hidden col-span-2">
                        <label class="text-[9px] text-indigo-400 font-bold uppercase block mb-1">Website URL (https://...)</label>
                        <input type="text" id="editUrl" placeholder="https://google.com" oninput="updateSelected()" class="w-full p-2 bg-indigo-950/30 border border-indigo-500/30 rounded-lg text-white text-xs">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="move(-1)" class="flex-1 py-1 bg-slate-800 rounded text-[9px] font-bold">MOVE UP</button>
                    <button onclick="move(1)" class="flex-1 py-1 bg-slate-800 rounded text-[9px] font-bold">MOVE DOWN</button>
                    <button onclick="removeComp()" class="flex-1 py-1 bg-red-900/20 text-red-500 rounded text-[9px] font-bold">DELETE</button>
                </div>
            </div>

            <pre class="code-pane"><code id="codeDisplay" class="language-html"></code></pre>
        </div>
        <div id="previewNotice" class="hidden p-8 text-center bg-indigo-600/10 border border-indigo-500/20 rounded-[2rem] italic text-slate-500">Preview Active. Interaction is live.</div>
    </div>

    <div class="lg:col-span-4 flex flex-col items-center">
        <div class="phone-viewport edit-mode grid-bg" id="canvas"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    let mode = 'edit';
    let screenIdx = 0;
    let selectedId = null;
    let project = [[], [], [], [], []];

    function setMode(m) {
        mode = m; selectedId = null;
        document.getElementById('editBtn').className = m === 'edit' ? 'px-6 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white' : 'px-6 py-2 rounded-xl text-xs font-bold text-slate-500';
        document.getElementById('previewBtn').className = m === 'preview' ? 'px-6 py-2 rounded-xl text-xs font-bold bg-indigo-600 text-white' : 'px-6 py-2 rounded-xl text-xs font-bold text-slate-500';
        document.getElementById('canvas').className = `phone-viewport ${m}-mode ${m === 'edit' ? 'grid-bg' : ''}`;
        document.getElementById('editorUI').classList.toggle('hidden', m === 'preview');
        document.getElementById('previewNotice').classList.toggle('hidden', m === 'edit');
        document.getElementById('inspector').classList.add('hidden');
        render();
    }

    function switchScreen(idx) {
        screenIdx = idx; selectedId = null;
        if(mode === 'edit') document.getElementById('inspector').classList.add('hidden');
        for(let i=0; i<5; i++) document.getElementById(`tab-${i}`).classList.toggle('tab-active', i === idx);
        render();
    }

    function render() {
        const canvas = document.getElementById('canvas'); canvas.innerHTML = "";
        project[screenIdx].forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `ui-component ${selectedId === i ? 'selected' : ''}`;
            
            div.onclick = (e) => {
                e.stopPropagation();
                if(mode === 'preview') {
                    if(item.actionType === 'nav') switchScreen(parseInt(item.actionValue));
                    if(item.actionType === 'url' && item.actionValue) window.open(item.actionValue, '_blank');
                } else {
                    selectComp(i);
                }
            };

            let inner = "";
            if(item.type === 'Button') inner = `<div class="p-6"><button class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg text-sm uppercase tracking-widest">${item.label}</button></div>`;
            else if(item.type === 'Header') inner = `<h1 class="text-3xl font-black p-8 bg-white border-b-4 text-slate-900">${item.label}</h1>`;
            else inner = `<div class="p-6 text-slate-600 font-medium">${item.label}</div>`;
            
            div.innerHTML = inner; canvas.appendChild(div);
        });
        updateCode();
    }

    function selectComp(i) {
        selectedId = i; const item = project[screenIdx][i];
        document.getElementById('inspector').classList.remove('hidden');
        document.getElementById('editLabel').value = item.label;
        document.getElementById('editActionType').value = item.actionType;
        document.getElementById('editNavDest').value = item.actionType === 'nav' ? item.actionValue : "0";
        document.getElementById('editUrl').value = item.actionType === 'url' ? item.actionValue : "";
        toggleUrlInput(); render();
    }

    function toggleUrlInput() {
        const type = document.getElementById('editActionType').value;
        document.getElementById('navSelectDiv').classList.toggle('hidden', type !== 'nav');
        document.getElementById('urlInputDiv').classList.toggle('hidden', type !== 'url');
    }

    function updateSelected() {
        if(selectedId === null) return;
        const item = project[screenIdx][selectedId];
        item.label = document.getElementById('editLabel').value;
        item.actionType = document.getElementById('editActionType').value;
        if(item.actionType === 'nav') item.actionValue = document.getElementById('editNavDest').value;
        else if(item.actionType === 'url') item.actionValue = document.getElementById('editUrl').value;
        else item.actionValue = "";
        render();
    }

    function addComponent() {
        const val = document.getElementById('cmdInput').value; if(!val) return;
        const match = val.match(/"([^"]+)"|'([^']+)'/);
        const name = match ? (match[1] || match[2]) : "Untitled";
        let type = val.toLowerCase().includes('header') ? "Header" : (val.toLowerCase().includes('button') ? "Button" : "Text");
        project[screenIdx].push({ type, label: name, actionType: 'none', actionValue: '' });
        document.getElementById('cmdInput').value = ""; render();
    }

    function updateCode() {
        const code = project[screenIdx].map(item => {
            const attr = item.actionType !== 'none' ? ` action="${item.actionType}:${item.actionValue}"` : "";
            return `<${item.type}${attr}>${item.label}</${item.type}>`;
        }).join('\n');
        document.getElementById('codeDisplay').textContent = code || "";
        Prism.highlightElement(document.getElementById('codeDisplay'));
    }

    function move(dir) {
        const to = selectedId + dir;
        if(to >= 0 && to < project[screenIdx].length) {
            [project[screenIdx][selectedId], project[screenIdx][to]] = [project[screenIdx][to], project[screenIdx][selectedId]];
            selectedId = to; render();
        }
    }

    function removeComp() { project[screenIdx].splice(selectedId, 1); selectedId = null; document.getElementById('inspector').classList.add('hidden'); render(); }
    
    render();
</script>
</body>
</html>
